    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    />
    <style>
:root {
  --bg-0: #050403;
  --bg-1: #0c0a08;
  --gold: #e8b86a;
  --gold-bright: #ffd89a;
  --gold-dim: #8a6a3a;
  --amber: #c8792e;
  --cream: #f3e6d0;
  --ink: #1a1510;
  --glass: rgba(232, 184, 106, 0.08);
  --line: rgba(232, 184, 106, 0.22);
  --dock-bg: rgba(8, 6, 4, 0.72);
  --font-display: "Syne", sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, monospace;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  height: 100%;
  background: var(--bg-0);
  color: var(--cream);
  font-family: var(--font-mono);
  overflow: hidden;
}

#app {
  position: relative;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(ellipse 80% 60% at 50% 45%, #1a1208 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 100%, #120c06 0%, var(--bg-0) 55%);
}

#stage {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}

.drop-hint {
  position: absolute;
  inset: 0;
  z-index: 1;
  display: grid;
  place-content: center;
  text-align: center;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.drop-hint.is-hidden {
  opacity: 0;
}

.drop-hint__title {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(1.2rem, 2.5vw, 1.8rem);
  color: var(--cream);
  letter-spacing: 0.04em;
}

.drop-hint__meta {
  margin: 0.6rem 0 0;
  font-size: 0.75rem;
  letter-spacing: 0.16em;
  color: var(--gold-dim);
}

.dock {
  position: absolute;
  left: 50%;
  bottom: 2rem;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  align-items: center;
  gap: 1rem;
  width: min(920px, calc(100% - 2rem));
  padding: 0.85rem 1.25rem;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--dock-bg);
  backdrop-filter: blur(16px);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.dock.is-hidden {
  opacity: 0;
  transform: translate(-50%, 1rem);
  pointer-events: none;
}

.btn {
  appearance: none;
  border: 1px solid var(--line);
  background: var(--glass);
  color: var(--gold-bright);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.55rem 0.9rem;
  border-radius: 999px;
  cursor: pointer;
  transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.icon-btn {
  width: 3rem;
  height: 3rem;
  padding: 0;
  border-radius: 50%;
  background: rgba(232, 184, 106, 0.15);
  border-color: rgba(232, 184, 106, 0.4);
  color: #fff;
}

.icon-btn:hover:not(:disabled) {
  background: rgba(232, 184, 106, 0.25);
  border-color: rgba(232, 184, 106, 0.6);
}

.secondary-btn {
  font-size: 0.7rem;
  padding: 0.45rem 0.75rem;
  background: transparent;
  border-color: transparent;
  color: var(--gold-dim);
}

.secondary-btn:hover:not(:disabled) {
  background: rgba(255, 255, 255, 0.05);
  color: var(--gold);
}

.btn:hover:not(:disabled) {
  background: rgba(232, 184, 106, 0.18);
  border-color: rgba(232, 184, 106, 0.45);
}

.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.file-btn {
  display: inline-flex;
  align-items: center;
}

.track {
  flex: 1;
  min-width: 0;
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.25rem;
}

.track__name {
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--gold-bright);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.seek {
  width: 100%;
  accent-color: var(--gold);
  height: 0.45rem;
  cursor: pointer;
}

.track__time {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--gold-dim);
}

.controls-group {
  display: flex;
  gap: 1rem;
}

.sens {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-dim);
  min-width: 5rem;
}

.sens input {
  width: 100%;
  accent-color: var(--amber);
}

@media (max-width: 720px) {
  .dock {
    flex-wrap: wrap;
    border-radius: 1.25rem;
    justify-content: center;
  }

  .sens {
    width: 100%;
  }
}

@media (prefers-reduced-motion: reduce) {
  .drop-hint {
    transition: none;
  }
}

        </button>
        <label class="btn file-btn secondary-btn">
          上传
          <input id="fileInput" type="file" accept="audio/*,.mp3,.wav,.ogg,.flac,.m4a,.aac" hidden />
        </label>
        <div class="track">
          <span class="track__name" id="trackName">未选择音频</span>
          <input id="seek" class="seek" type="range" min="0" max="1000" value="0" disabled />
          <div class="track__time">
            <span id="timeCurrent">0:00</span>
            <span id="timeTotal">0:00</span>
          </div>
        </div>
        <div class="controls-group">
          <label class="sens">

            <input id="sensitivity" type="range" min="0.5" max="2" step="0.05" value="1" />

            <input id="smoothness" type="range" min="0.1" max="0.9" step="0.05" value="0.7" />

        </div>
      </footer>
    </div>

    for (let i = 0; i < idleFreq.length; i++) {
      const t = i / idleFreq.length;
      idleFreq[i] = Math.floor(
        (28 + 22 * Math.sin(time * 1.6 + t * 14) + 16 * Math.sin(time * 0.9 + t * 5) + 10 * Math.sin(time * 2.4 + t * 28) + 8 * Math.sin(time * 0.4 + t * 2.2)) * (1 - t * 0.55)
      );
    }
    return idleFreq;
  }
  function idleWave(time) {
    for (let i = 0; i < idleWaveBuf.length; i++) {
      const t = i / idleWaveBuf.length;
      idleWaveBuf[i] = Math.floor(128 + 18 * Math.sin(time * 2 + t * Math.PI * 8));
    }
    return idleWaveBuf;
  }

  // src/main.ts
  function mustEl(sel) {
    const el = document.querySelector(sel);
    if (!el) throw new Error(`\u7F3A\u5C11\u5143\u7D20: ${sel}`);
    return el;
  }
  var canvas = mustEl("#stage");
  var fileInput = mustEl("#fileInput");
  var playBtn = mustEl("#playBtn");
  var iconPlay = mustEl("#icon-play");
  var iconPause = mustEl("#icon-pause");
  var seek = mustEl("#seek");
  var trackName = mustEl("#trackName");
  var timeCurrent = mustEl("#timeCurrent");
  var timeTotal = mustEl("#timeTotal");
  var sensitivity = mustEl("#sensitivity");
  var smoothness = mustEl("#smoothness");
  var dropHint = mustEl("#dropHint");
  var dock = mustEl("#dock");
  var engine = new AudioEngine();
  var onset = new OnsetDetector();
  var renderer = new VisualRenderer(canvas);
  var hasTrack = false;
  var seeking = false;
  var lastTs = performance.now();
  function formatTime(sec) {
    if (!Number.isFinite(sec) || sec < 0) return "0:00";
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2, "0")}`;
  }
  function setPlayLabel() {
    if (engine.playing) {
      iconPlay.style.display = "none";
      iconPause.style.display = "block";
    } else {
      iconPlay.style.display = "block";
      iconPause.style.display = "none";
    }
  }
  function isAudioFile(file) {
    if (file.type.startsWith("audio/")) return true;
    return /\.(mp3|wav|ogg|flac|m4a|aac|opus|webm)$/i.test(file.name);
  }
  async function loadFile(file) {
    if (!isAudioFile(file)) {
      trackName.textContent = "\u8BF7\u9009\u62E9\u97F3\u9891\u6587\u4EF6";
      return;
    }
    await engine.loadFile(file);
    hasTrack = true;
    trackName.textContent = file.name;
    playBtn.disabled = false;
    seek.disabled = false;
    dropHint.classList.add("is-hidden");
    timeTotal.textContent = formatTime(engine.duration);
    seek.value = "0";
    await engine.play();
    setPlayLabel();
    resetHideTimeout();
  }
  fileInput.addEventListener("change", () => {
    const file = fileInput.files?.[0];
    if (!file) return;
    void loadFile(file).catch((err) => {
      console.error(err);
      trackName.textContent = "\u52A0\u8F7D\u5931\u8D25\uFF0C\u8BF7\u6362\u4E00\u4E2A\u6587\u4EF6";
    });
  });
  playBtn.addEventListener("click", () => {
    void (async () => {
      if (!hasTrack) return;
      if (engine.playing) {
        engine.pause();
      } else {
        await engine.play();
      }
      setPlayLabel();
      resetHideTimeout();
    })();
  });
  seek.addEventListener("pointerdown", () => {
    seeking = true;
  });
  seek.addEventListener("pointerup", () => {
    seeking = false;
    if (!hasTrack) return;
    const t = Number(seek.value) / 1e3 * engine.duration;
    engine.seek(t);
  });
  seek.addEventListener("input", () => {
    if (!hasTrack) return;
    const t = Number(seek.value) / 1e3 * engine.duration;
    timeCurrent.textContent = formatTime(t);
  });
  sensitivity.addEventListener("input", () => {
    onset.setSensitivity(Number(sensitivity.value));
  });
  onset.setSensitivity(Number(sensitivity.value));
  smoothness.addEventListener("input", () => {
    renderer.setSmoothness(Number(smoothness.value));
  });
  renderer.setSmoothness(Number(smoothness.value));
  var hideTimeout = 0;
  function resetHideTimeout() {
    dock.classList.remove("is-hidden");
    window.clearTimeout(hideTimeout);
    hideTimeout = window.setTimeout(() => {
      if (hasTrack && engine.playing) {
        dock.classList.add("is-hidden");
      }
    }, 2500);
  }
  window.addEventListener("mousemove", resetHideTimeout);
  window.addEventListener("pointerdown", resetHideTimeout);
  resetHideTimeout();
  engine.audio.addEventListener("ended", () => {
    setPlayLabel();
    dock.classList.remove("is-hidden");
  });
  engine.audio.addEventListener("loadedmetadata", () => {
    timeTotal.textContent = formatTime(engine.duration);
  });
  function onDrag(e) {
    e.preventDefault();
    e.stopPropagation();
  }
  ["dragenter", "dragover", "dragleave", "drop"].forEach((evt) => {
    document.addEventListener(evt, onDrag);
    window.addEventListener(evt, onDrag);
  });
  document.addEventListener("drop", (e) => {
    const file = e.dataTransfer?.files?.[0];
    if (!file) return;
    void loadFile(file).catch((err) => {
      console.error(err);
      trackName.textContent = "\u52A0\u8F7D\u5931\u8D25\uFF0C\u8BF7\u6362\u4E00\u4E2A\u6587\u4EF6";
    });
  });
  function onResize() {
    renderer.resize();
  }
  window.addEventListener("resize", onResize);
  onResize();
  function frame(now) {
    const dt = Math.min(0.05, (now - lastTs) / 1e3);
    lastTs = now;
    const t = now / 1e3;
    const audio = hasTrack ? engine.sample() : null;
    let onsetState = null;
    if (audio && engine.playing) {
      onsetState = onset.update(
        {
          bass: audio.bass,
          lowMid: audio.lowMid,
          mid: audio.mid,
          high: audio.high
        },
        now,
        dt
      );
    }
    renderer.render(audio, onsetState, t, dt, engine.playing);
    if (hasTrack && !seeking) {
      const dur = engine.duration || 1;
      seek.value = String(Math.floor(engine.currentTime / dur * 1e3));
      timeCurrent.textContent = formatTime(engine.currentTime);
      timeTotal.textContent = formatTime(engine.duration);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

    </script>
  </body>
</html>
